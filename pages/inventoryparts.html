<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inventory Parts</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/inventoryparts.css">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-L0J7RTR14Z"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-L0J7RTR14Z');
  </script>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<script type="module">
import { loadLayout } from "../app/layout.js";

let inventoryData = [];

function render() {
  document.getElementById("content").innerHTML = `
    <h2>Inventory Parts</h2>

    <div class="control-bar">
      <input type="file" id="csvInput" accept=".csv">
      <input type="text" id="searchInput" placeholder="Search assets...">
      <button id="clearBtn">Clear</button>
    </div>

    <div id="statsBar"></div>
    <div id="tableContainer"></div>
  `;

  initEvents();
}

function initEvents() {
  const csvInput = document.getElementById("csvInput");
  const searchInput = document.getElementById("searchInput");
  const clearBtn = document.getElementById("clearBtn");

  csvInput.addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;

    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: result => {
        inventoryData = result.data;
        renderTable(inventoryData);
        renderStats(inventoryData);
      }
    });
  });

  searchInput.addEventListener("input", () => {
    const query = searchInput.value.toLowerCase();

    const filtered = inventoryData.filter(row =>
      Object.values(row).some(val =>
        String(val).toLowerCase().includes(query)
      )
    );

    renderTable(filtered);
    renderStats(filtered);
  });

  clearBtn.addEventListener("click", () => {
    searchInput.value = "";
    renderTable(inventoryData);
    renderStats(inventoryData);
  });
}

function renderTable(data) {
  const tableContainer = document.getElementById("tableContainer");

  if (!data.length) {
    tableContainer.innerHTML = "<p>No data loaded.</p>";
    return;
  }

  const headers = Object.keys(data[0]);

  const headerRow = `
    <div class="table-row header">
      ${headers.map(h => `<div>${h}</div>`).join("")}
    </div>
  `;

  const rows = data.map(row => `
    <div class="table-row">
      ${headers.map(h => `<div>${row[h] || ""}</div>`).join("")}
    </div>
  `).join("");

  tableContainer.innerHTML = `
    <div class="table-grid">
      ${headerRow}
      ${rows}
    </div>
  `;
}

function renderStats(data) {
  const statsBar = document.getElementById("statsBar");

  statsBar.innerHTML = `
    <div class="stat-box">
      Total Assets: <strong>${data.length}</strong>
    </div>
  `;
}

window.addEventListener("DOMContentLoaded", async () => {
  await loadLayout("inventoryparts");
  render();
  document.body.classList.add("page-loaded");
});
</script>

</body>
</html>
