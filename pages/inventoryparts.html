<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inventory Parts</title>

  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/inventoryparts.css">

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<div id="content">

  <h2>Inventory Parts</h2>

  <div class="control-bar">
    <input type="file" id="csvInput" accept=".csv">
    <input type="text" id="searchInput" placeholder="Search (multi-term supported)">
    <button id="clearBtn">Clear</button>
    <button id="exportBtn">Export Filtered</button>
  </div>

  <div id="filterBar" class="filter-bar"></div>
  <div id="statsBar" class="stats-bar"></div>
  <div id="tableContainer"></div>

</div>

<script type="module">
import { loadLayout } from "../app/layout.js";

let inventoryData = [];
let filteredData = [];

let activeFilters = {};
let activeSearch = "";
let activeSort = { column: null, direction: "asc" };

window.addEventListener("DOMContentLoaded", async () => {
  await loadLayout("inventoryparts");
  initEvents();
  document.body.classList.add("page-loaded");
});

/* =========================
   EVENTS
========================= */

function initEvents() {
  document.getElementById("csvInput").addEventListener("change", handleCSV);

  document.getElementById("searchInput").addEventListener("input", e => {
    activeSearch = e.target.value.trim();
    applyAllFilters();
  });

  document.getElementById("clearBtn").addEventListener("click", resetAll);

  document.getElementById("exportBtn").addEventListener("click", exportFiltered);
}

/* =========================
   CSV LOAD
========================= */

function handleCSV(e) {
  const file = e.target.files[0];
  if (!file) return;

  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
complete: result => {

  const rawData = result.data;

  if (!rawData.length) return;

  // Check of kolom bestaat (case insensitive)
  const headers = Object.keys(rawData[0]);
  const totalColumn = headers.find(h => h.toLowerCase() === "total");

  if (!totalColumn) {
    console.warn("No 'Total' column found.");
    inventoryData = rawData;
  } else {
    inventoryData = rawData.filter(row => {
      const value = Number(row[totalColumn]);
      return !isNaN(value) && value !== 0;
    });
  }

  generateColumnFilters(inventoryData);
  applyAllFilters();
}
  });
}

/* =========================
   FILTER ENGINE
========================= */

function applyAllFilters() {
  let result = [...inventoryData];

  // Column filters
  Object.entries(activeFilters).forEach(([col, val]) => {
    if (val) {
      result = result.filter(row => row[col] === val);
    }
  });

  // Search
  result = applySearch(result);

  // Sorting
  if (activeSort.column) {
    result.sort((a, b) => {
      const valA = a[activeSort.column] || "";
      const valB = b[activeSort.column] || "";

      return activeSort.direction === "asc"
        ? valA.localeCompare(valB, undefined, { numeric: true })
        : valB.localeCompare(valA, undefined, { numeric: true });
    });
  }

  filteredData = result;

  renderTable(filteredData);
  renderStats(filteredData);
}

/* =========================
   SEARCH (Multi-term AND)
========================= */

function applySearch(data) {
  if (!activeSearch) return data;

  const terms = activeSearch
    .toLowerCase()
    .split(" ")
    .filter(Boolean);

  return data.filter(row => {
    const rowString = Object.values(row).join(" ").toLowerCase();
    return terms.every(term => rowString.includes(term));
  });
}

/* =========================
   COLUMN FILTERS
========================= */

function generateColumnFilters(data) {
  if (!data.length) return;

  const headers = Object.keys(data[0]);
  const filterBar = document.getElementById("filterBar");

  filterBar.innerHTML = headers.map(header => {
    const uniqueValues = [...new Set(
      data.map(row => row[header]).filter(v => v && v.length < 50)
    )];

    if (uniqueValues.length > 50) return "";

    return `
      <select data-column="${header}" class="column-filter">
        <option value="">All ${header}</option>
        ${uniqueValues.sort().map(val => `
          <option value="${val}">${val}</option>
        `).join("")}
      </select>
    `;
  }).join("");

  document.querySelectorAll(".column-filter").forEach(select => {
    select.addEventListener("change", e => {
      const col = e.target.dataset.column;
      activeFilters[col] = e.target.value;
      applyAllFilters();
    });
  });
}

/* =========================
   TABLE
========================= */

function renderTable(data) {
  const container = document.getElementById("tableContainer");

  if (!data.length) {
    container.innerHTML = "<p>No data available.</p>";
    return;
  }

  const headers = Object.keys(data[0]);

  const headerRow = `
    <div class="table-row header">
      ${headers.map(h => `
        <div class="sortable" data-column="${h}">
          ${h}
        </div>
      `).join("")}
    </div>
  `;

  const rows = data.map(row => `
    <div class="table-row">
      ${headers.map(h => `<div>${row[h] || ""}</div>`).join("")}
    </div>
  `).join("");

  container.innerHTML = `
    <div class="table-grid">
      ${headerRow}
      ${rows}
    </div>
  `;

  attachSortEvents();
}

function attachSortEvents() {
  document.querySelectorAll(".sortable").forEach(el => {
    el.addEventListener("click", () => {
      const col = el.dataset.column;

      if (activeSort.column === col) {
        activeSort.direction =
          activeSort.direction === "asc" ? "desc" : "asc";
      } else {
        activeSort.column = col;
        activeSort.direction = "asc";
      }

      applyAllFilters();
    });
  });
}

/* =========================
   STATS
========================= */

function renderStats(data) {
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-box">
      Showing: <strong>${data.length}</strong>
    </div>
    <div class="stat-box">
      Total Loaded: <strong>${inventoryData.length}</strong>
    </div>
  `;
}

/* =========================
   RESET
========================= */

function resetAll() {
  activeSearch = "";
  activeFilters = {};
  activeSort = { column: null, direction: "asc" };

  document.getElementById("searchInput").value = "";
  document.getElementById("filterBar").innerHTML = "";

  generateColumnFilters(inventoryData);
  applyAllFilters();
}

/* =========================
   EXPORT
========================= */

function exportFiltered() {
  if (!filteredData.length) return;

  const csv = Papa.unparse(filteredData);
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "filtered_inventory.csv";
  a.click();
}

</script>

</body>
</html>
