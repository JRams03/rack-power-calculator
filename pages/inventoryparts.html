<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Parts</title>

<link rel="stylesheet" href="../styles/base.css">
<link rel="stylesheet" href="../styles/inventoryparts.css">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<div id="content"></div>

<script type="module">

import { loadLayout } from "../app/layout.js";

/* ================= STATE ================= */

let rawData = [];
let filteredData = [];
let headers = [];
let viewMode = "grouped";

/* ================= INIT ================= */

window.addEventListener("DOMContentLoaded", async () => {
  await loadLayout("inventoryparts");
  initPage();
});

function initPage() {
  renderPage();
  attachEvents();
}

/* ================= PAGE STRUCTURE ================= */

function renderPage() {
  const content = document.getElementById("content");

  if (!content) {
    console.error("Layout failed to inject #content");
    return;
  }

  content.innerHTML = `
    <h2>Inventory Parts</h2>

    <div class="control-bar">
      <input type="file" id="csvInput" accept=".csv">
      <input type="text" id="globalSearch" placeholder="Search...">
      <select id="viewToggle">
        <option value="grouped">Grouped View</option>
        <option value="flat">Flat View</option>
      </select>
      <button id="resetBtn">Reset</button>
    </div>

    <div id="tableContainer"></div>
  `;
}

/* ================= EVENTS ================= */

function attachEvents() {
  document.getElementById("csvInput")?.addEventListener("change", handleCSV);
  document.getElementById("globalSearch")?.addEventListener("input", update);
  document.getElementById("viewToggle")?.addEventListener("change", e => {
    viewMode = e.target.value;
    render();
  });
  document.getElementById("resetBtn")?.addEventListener("click", resetAll);
}

/* ================= CSV LOAD ================= */

function handleCSV(e) {
  const file = e.target.files[0];
  if (!file) return;

  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    complete: result => {

      const data = result.data
        .map(row => {
          delete row._parsed_extra;
          return row;
        })
        .filter(row =>
          Object.values(row).some(v => v !== "")
        );

      if (!data.length) {
        console.warn("CSV contains no usable data");
        return;
      }

      headers = Object.keys(data[0]);

      const totalColumn = headers.find(h =>
        h.trim().toLowerCase() === "total"
      );

      rawData = totalColumn
        ? data.filter(row => Number(row[totalColumn]) !== 0)
        : data;

      filteredData = rawData;

      render();
    }
  });
}

/* ================= UPDATE ================= */

function update() {
  const search = document.getElementById("globalSearch").value
    .toLowerCase()
    .split(" ")
    .filter(Boolean);

  filteredData = rawData.filter(row => {
    const rowText = Object.values(row).join(" ").toLowerCase();
    return search.every(term => rowText.includes(term));
  });

  render();
}

/* ================= RENDER ================= */

function render() {
  const container = document.getElementById("tableContainer");
  if (!container) return;

  if (!filteredData.length) {
    container.innerHTML = "<p>No data</p>";
    return;
  }

  if (viewMode === "flat") {
    renderFlat(container);
  } else {
    renderGrouped(container);
  }
}

/* ================= FLAT VIEW ================= */

function renderFlat(container) {

  const totalColumn = headers.find(h =>
    h.trim().toLowerCase() === "total"
  );

  container.innerHTML = `
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            ${headers.map(h => `<th>${h}</th>`).join("")}
          </tr>
        </thead>
        <tbody>
          ${filteredData.map(row => `
            <tr>
              ${headers.map(h => `
                <td class="${
                  h === totalColumn && Number(row[h]) < 5
                    ? "low-stock"
                    : ""
                }">
                  ${row[h] ?? ""}
                </td>
              `).join("")}
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}

/* ================= GROUPED VIEW ================= */

function renderGrouped(container) {

  const totalColumn = headers.find(h =>
    h.trim().toLowerCase() === "total"
  );

  const partColumn =
    headers.find(h => h.toLowerCase().includes("part")) ||
    headers[0];

  const groups = {};

  filteredData.forEach(row => {
    const key = row[partColumn] || "Unknown";
    if (!groups[key]) groups[key] = [];
    groups[key].push(row);
  });

  container.innerHTML = Object.entries(groups)
    .map(([groupName, rows], index) => `
      <div class="group">
        <div class="group-header" data-id="${index}">
          <span>${groupName}</span>
          <span>Total: ${sumTotal(rows, totalColumn)}</span>
        </div>

        <div class="group-body" id="group-${index}" style="display:block;">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  ${headers.map(h => `<th>${h}</th>`).join("")}
                </tr>
              </thead>
              <tbody>
                ${rows.map(row => `
                  <tr>
                    ${headers.map(h => `
                      <td class="${
                        h === totalColumn && Number(row[h]) < 5
                          ? "low-stock"
                          : ""
                      }">
                        ${row[h] ?? ""}
                      </td>
                    `).join("")}
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `).join("");

  attachGroupToggle();
}

function sumTotal(rows, totalColumn) {
  if (!totalColumn) return rows.length;

  return rows.reduce((sum, r) =>
    sum + Number(r[totalColumn] || 0), 0);
}

/* ================= GROUP TOGGLE ================= */

function attachGroupToggle() {
  document.querySelectorAll(".group-header").forEach(header => {
    header.addEventListener("click", () => {
      const id = header.dataset.id;
      const body = document.getElementById(`group-${id}`);
      body.style.display =
        body.style.display === "block" ? "none" : "block";
    });
  });
}

/* ================= RESET ================= */

function resetAll() {
  document.getElementById("globalSearch").value = "";
  filteredData = rawData;
  render();
}

</script>
</body>
</html>
