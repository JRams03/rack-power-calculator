<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Parts</title>
<script type="module">
import { loadLayout } from "../app/layout.js";

/* ================= STATE ================= */

let rawData = [];
let filteredData = [];
let headers = [];
let viewMode = "grouped";

/* ================= INIT ================= */

window.addEventListener("DOMContentLoaded", async () => {
  await loadLayout("inventoryparts");
  renderPage();
  attachEvents();
});

/* ================= PAGE STRUCTURE ================= */

function renderPage() {
  document.getElementById("content").innerHTML = `
    <h2>Inventory Parts</h2>

    <div class="control-bar">
      <input type="file" id="csvInput" accept=".csv">
      <input type="text" id="globalSearch" placeholder="Search...">
      <select id="viewToggle">
        <option value="grouped">Grouped View</option>
        <option value="flat">Flat View</option>
      </select>
      <button id="resetBtn">Reset</button>
    </div>

    <div id="tableContainer"></div>
  `;
}

/* ================= EVENTS ================= */

function attachEvents() {
  document.getElementById("csvInput").addEventListener("change", handleCSV);
  document.getElementById("globalSearch").addEventListener("input", update);
  document.getElementById("viewToggle").addEventListener("change", e => {
    viewMode = e.target.value;
    render();
  });
  document.getElementById("resetBtn").addEventListener("click", resetAll);
}

/* ================= CSV LOAD ================= */

function handleCSV(e) {
  const file = e.target.files[0];
  if (!file) return;

  Papa.parse(file, {
    header: false,
    skipEmptyLines: true,
    delimiter: ",",
    complete: result => {

      if (!result.data || result.data.length < 2) {
        console.error("Invalid CSV");
        return;
      }

      // Headers (remove empty trailing column)
      headers = result.data[0]
        .map(h => String(h).trim())
        .filter(Boolean);

      const totalIndex = headers.findIndex(h =>
        h.toLowerCase() === "total"
      );

      const rows = result.data.slice(1);

      rawData = rows
        .map(row => {
          const obj = {};
          headers.forEach((header, index) => {
            obj[header] = String(row[index] ?? "").trim();
          });
          return obj;
        })
        .filter(row => {
          if (totalIndex === -1) return true;
          const total = Number(row[headers[totalIndex]]);
          return !isNaN(total) && total !== 0;
        });

      update();
    }
  });
}

/* ================= FILTER ================= */

function update() {
  const search = document.getElementById("globalSearch").value
    .toLowerCase()
    .split(" ")
    .filter(Boolean);

  filteredData = rawData.filter(row => {
    const text = Object.values(row).join(" ").toLowerCase();
    return search.every(term => text.includes(term));
  });

  render();
}

/* ================= RENDER ================= */

function render() {
  if (viewMode === "flat") {
    renderFlat();
  } else {
    renderGrouped();
  }
}

/* ================= FLAT VIEW ================= */

function renderFlat() {
  const container = document.getElementById("tableContainer");

  if (!filteredData.length) {
    container.innerHTML = "<p>No data</p>";
    return;
  }

  container.innerHTML = `
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            ${headers.map(h => `<th>${h}</th>`).join("")}
          </tr>
        </thead>
        <tbody>
          ${filteredData.map(row => `
            <tr>
              ${headers.map(h => `
                <td class="${
                  h.toLowerCase() === "total" && Number(row[h]) < 5
                    ? "low-stock"
                    : ""
                }">
                  ${row[h] || ""}
                </td>
              `).join("")}
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}

/* ================= GROUPED VIEW ================= */

function renderGrouped() {
  const container = document.getElementById("tableContainer");

  if (!filteredData.length) {
    container.innerHTML = "<p>No data</p>";
    return;
  }

  const partColumn = headers.find(h =>
    h.toLowerCase().includes("part")
  );

  const groups = {};

  filteredData.forEach(row => {
    const key = row[partColumn] || "Unknown";
    if (!groups[key]) groups[key] = [];
    groups[key].push(row);
  });

  container.innerHTML = Object.entries(groups)
    .map(([groupName, rows], index) => `
      <div class="group">

        <div class="group-header" data-group="${index}">
          <span>${groupName}</span>
          <span>Total: ${sumTotal(rows)}</span>
        </div>

        <div class="group-body" id="group-${index}" style="display:block;">

          <input 
            type="text"
            class="group-search"
            data-group="${index}"
            placeholder="Filter within group..."
          />

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  ${headers.map(h => `<th>${h}</th>`).join("")}
                </tr>
              </thead>
              <tbody>
                ${rows.map(row => `
                  <tr data-group="${index}">
                    ${headers.map(h => `
                      <td class="${
                        h.toLowerCase() === "total" && Number(row[h]) < 5
                          ? "low-stock"
                          : ""
                      }">
                        ${row[h] || ""}
                      </td>
                    `).join("")}
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>

        </div>

      </div>
    `).join("");

  attachGroupToggle();
  attachGroupSearch();
}

/* ================= HELPERS ================= */

function sumTotal(rows) {
  const totalColumn = headers.find(h =>
    h.toLowerCase() === "total"
  );

  if (!totalColumn) return 0;

  return rows.reduce((sum, r) =>
    sum + Number(r[totalColumn] || 0), 0);
}

function attachGroupToggle() {
  document.querySelectorAll(".group-header").forEach(header => {
    header.addEventListener("click", () => {
      const id = header.dataset.group;
      const body = document.getElementById(`group-${id}`);
      body.style.display =
        body.style.display === "none" ? "block" : "none";
    });
  });
}

function attachGroupSearch() {
  document.querySelectorAll(".group-search").forEach(input => {
    input.addEventListener("input", e => {
      const groupId = e.target.dataset.group;
      const terms = e.target.value.toLowerCase().split(" ").filter(Boolean);

      document.querySelectorAll(`tr[data-group="${groupId}"]`)
        .forEach(row => {
          const text = row.textContent.toLowerCase();
          const match = terms.every(t => text.includes(t));
          row.style.display = match ? "" : "none";
        });
    });
  });
}

function resetAll() {
  document.getElementById("globalSearch").value = "";
  filteredData = rawData;
  render();
}
</script>
