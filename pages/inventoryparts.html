<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Parts</title>

<link rel="stylesheet" href="../styles/base.css">
<link rel="stylesheet" href="../styles/inventoryparts.css">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<div id="content">
  <!-- Layout injecteert hier zijn content -->
</div>

<script type="module">
import { loadLayout } from "../app/layout.js";

/* ================= STATE ================= */

let rawData = [];
let filteredData = [];
let headers = [];
let viewMode = "grouped";

/* ================= INIT ================= */

window.addEventListener("DOMContentLoaded", async () => {
  await loadLayout("inventoryparts");

  setTimeout(() => {
    renderPage();
    attachEvents();
  }, 0);
});

/* ================= PAGE STRUCTURE ================= */

function renderPage() {
  document.getElementById("content").innerHTML = `
    <h2>Inventory Parts</h2>

    <div class="control-bar">
      <input type="file" id="csvInput" accept=".csv">
      <input type="text" id="globalSearch" placeholder="Search...">
      <select id="viewToggle">
        <option value="grouped">Grouped View</option>
        <option value="flat">Flat View</option>
      </select>
      <button id="resetBtn">Reset</button>
    </div>

    <div id="tableContainer"></div>
  `;
}

/* ================= EVENTS ================= */

function attachEvents() {
  document.getElementById("csvInput").addEventListener("change", handleCSV);
  document.getElementById("globalSearch").addEventListener("input", update);
  document.getElementById("viewToggle").addEventListener("change", e => {
    viewMode = e.target.value;
    render();
  });
  document.getElementById("resetBtn").addEventListener("click", resetAll);
}

/* ================= CSV LOAD ================= */


function handleCSV(e) {
  const file = e.target.files[0];
  if (!file) return;

  Papa.parse(file, {
    header: false, // 🔥 geen header mode
    skipEmptyLines: true,
    delimiter: ",",
    complete: result => {

      if (!result.data || result.data.length < 2) {
        console.error("CSV invalid or empty");
        return;
      }

      // Eerste rij = headers
      const rawHeaders = result.data[0]
        .map(h => String(h).trim())
        .filter(Boolean); // verwijder lege kolom door trailing comma

      headers = rawHeaders;

      // Rest = data
      const rows = result.data.slice(1);

      rawData = rows.map(row => {
        const obj = {};

        headers.forEach((header, index) => {
          obj[header] = String(row[index] ?? "").trim();
        });

        return obj;
      })
      .filter(row => {
        const total = Number(String(row["Total"] || "").trim());
        return !isNaN(total) && total !== 0;
      });

          console.log("HEADERS:", headers);
          console.log("RAW ROW COUNT:", rawData.length);
          console.log("FIRST RAW ROW:", rawData[0]);

      update();
    }
  });
}

/* ================= UPDATE ================= */

function update() {
  const search = document.getElementById("globalSearch").value
    .toLowerCase()
    .split(" ")
    .filter(Boolean);

  filteredData = rawData.filter(row => {
    const rowText = Object.values(row).join(" ").toLowerCase();
    return search.every(term => rowText.includes(term));
  });

  render();
}

/* ================= RENDER ================= */

function render() {

    console.log("Rendering. Mode:", viewMode);
    console.log("Filtered length:", filteredData.length);

  if (viewMode === "flat") {
    renderFlat();
  } else {
    renderGrouped();
  }
}

/* ================= FLAT VIEW ================= */

function renderFlat() {
  const container = document.getElementById("tableContainer");

  if (!filteredData.length) {
    container.innerHTML = "<p>No data</p>";
    return;
  }

  container.innerHTML = `
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            ${headers.map(h => `<th>${h}</th>`).join("")}
          </tr>
        </thead>
        <tbody>
          ${filteredData.map(row => `
            <tr>
              ${headers.map(h => `
                <td class="${
                  h === "Total" && Number(row[h]) < 5 ? "low-stock" : ""
                }">
                  ${row[h] || ""}
                </td>
              `).join("")}
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}

/* ================= GROUPED VIEW ================= */

function renderGrouped() {
  const container = document.getElementById("tableContainer");

  if (!filteredData.length) {
    container.innerHTML = "<p>No data</p>";
    return;
  }

  const groups = {};

  const partColumn = headers.find(h =>
    h.toLowerCase().includes("part")
  );

  filteredData.forEach(row => {
    const key = row[partColumn] || "Unknown";
    if (!groups[key]) groups[key] = [];
    groups[key].push(row);
  });

  container.innerHTML = Object.entries(groups)
    .map(([groupName, rows], index) => `
      <div class="group">

        <div class="group-header" data-group="${index}">
          <span>${groupName}</span>
          <span>Total: ${sumTotal(rows)}</span>
        </div>

        <div class="group-body" id="group-${index}" style="display:block;">

          <input 
            type="text"
            class="group-search"
            data-group="${index}"
            placeholder="Filter within group..."
          />

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  ${headers.map(h => `<th>${h}</th>`).join("")}
                </tr>
              </thead>
              <tbody>
                ${rows.map(row => `
                  <tr data-group="${index}">
                    ${headers.map(h => `
                      <td class="${
                        h === "Total" && Number(row[h]) < 5 ? "low-stock" : ""
                      }">
                        ${row[h] || ""}
                      </td>
                    `).join("")}
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>

        </div>

      </div>
    `).join("");

  attachGroupToggle();
  attachGroupSearch();
}

function sumTotal(rows) {
  return rows.reduce((sum, r) =>
    sum + Number(String(r["Total"]).trim() || 0), 0);
}

/* ================= GROUP SEARCH ================= */

function attachGroupSearch() {
  document.querySelectorAll(".group-search").forEach(input => {
    input.addEventListener("input", e => {
      const groupId = e.target.dataset.group;
      const terms = e.target.value.toLowerCase().split(" ").filter(Boolean);

      document.querySelectorAll(`tr[data-group="${groupId}"]`)
        .forEach(row => {
          const text = row.textContent.toLowerCase();
          const match = terms.every(t => text.includes(t));
          row.style.display = match ? "" : "none";
        });
    });
  });
}

/* ================= TOGGLE ================= */

function attachGroupToggle() {
  document.querySelectorAll(".group-header").forEach(header => {
    header.addEventListener("click", () => {
      const id = header.dataset.group;
      const body = document.getElementById(`group-${id}`);
      body.style.display =
        body.style.display === "block" ? "none" : "block";
    });
  });
}

/* ================= RESET ================= */

function resetAll() {
  document.getElementById("globalSearch").value = "";
  filteredData = rawData;
  render();
}

</script>
</body>
</html>
