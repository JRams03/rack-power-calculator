<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Dashboard</title>

<link rel="stylesheet" href="../styles/base.css">
<link rel="stylesheet" href="../styles/inventoryparts.css">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<div id="content">

<h2>Inventory Dashboard</h2>

<div class="control-bar">
  <input type="file" id="csvInput" accept=".csv">
  <input type="text" id="searchInput" placeholder="Search...">
  <select id="viewToggle">
    <option value="grouped">Grouped View</option>
    <option value="flat">Flat View</option>
  </select>
  <button id="resetBtn">Reset</button>
</div>

<div class="filter-bar">
  <select id="locationFilter">
    <option value="">All Locations</option>
  </select>
  <input type="number" id="minTotal" placeholder="Min Total">
</div>

<div id="dashboard" class="dashboard"></div>
<div id="tableContainer"></div>

</div>

<script type="module">
import { loadLayout } from "../app/layout.js";

/* =============================
   STATE
============================= */

let rawData = [];
let filteredData = [];

const columns = {
  part: "Part Type",
  location: "Location",
  total: "Total"
};

let activeSearch = "";
let activeLocation = "";
let activeMinTotal = null;
let viewMode = "grouped";

/* =============================
   INIT
============================= */

window.addEventListener("DOMContentLoaded", async () => {
  await loadLayout("inventoryparts");
  initEvents();
});

/* =============================
   EVENTS
============================= */

function initEvents() {

  document.getElementById("csvInput")
    .addEventListener("change", handleCSV);

  document.getElementById("searchInput")
    .addEventListener("input", e => {
      activeSearch = e.target.value.trim();
      update();
    });

  document.getElementById("locationFilter")
    .addEventListener("change", e => {
      activeLocation = e.target.value;
      update();
    });

  document.getElementById("minTotal")
    .addEventListener("input", e => {
      activeMinTotal = Number(e.target.value) || null;
      update();
    });

  document.getElementById("viewToggle")
    .addEventListener("change", e => {
      viewMode = e.target.value;
      render();
    });

  document.getElementById("resetBtn")
    .addEventListener("click", resetAll);
}

/* =============================
   CSV LOAD
============================= */

function handleCSV(e) {
  const file = e.target.files[0];
  if (!file) return;

  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    complete: result => {

      const data = result.data;

      if (!data.length) return;

      if (!data[0][columns.total]) {
        alert("Column 'Total' not found in CSV.");
        return;
      }

      // Filter Total = 0 direct bij load
      rawData = data.filter(row => {
        const value = Number(row[columns.total]);
        return !isNaN(value) && value !== 0;
      });

      populateLocationFilter();
      update();
    }
  });
}

/* =============================
   UPDATE STATE
============================= */

function update() {

  filteredData = rawData.filter(row => {

    if (activeLocation &&
        row[columns.location] !== activeLocation)
      return false;

    if (activeMinTotal !== null &&
        Number(row[columns.total]) < activeMinTotal)
      return false;

    if (activeSearch) {
      const rowString = Object.values(row)
        .join(" ")
        .toLowerCase();

      const terms = activeSearch
        .toLowerCase()
        .split(" ")
        .filter(Boolean);

      if (!terms.every(t => rowString.includes(t)))
        return false;
    }

    return true;
  });

  renderDashboard();
  render();
}

/* =============================
   DASHBOARD
============================= */

function renderDashboard() {

  const totalUnits = filteredData
    .reduce((sum, r) =>
      sum + Number(r[columns.total]), 0);

  const uniqueParts = new Set(
    filteredData.map(r => r[columns.part])
  ).size;

  const uniqueLocations = new Set(
    filteredData.map(r => r[columns.location])
  ).size;

  const lowStock = filteredData
    .filter(r => Number(r[columns.total]) < 5)
    .length;

  document.getElementById("dashboard").innerHTML = `
    <div class="card">
      <h3>Total Units</h3>
      <p>${totalUnits}</p>
    </div>
    <div class="card">
      <h3>Unique Parts</h3>
      <p>${uniqueParts}</p>
    </div>
    <div class="card">
      <h3>Locations</h3>
      <p>${uniqueLocations}</p>
    </div>
    <div class="card">
      <h3>Low Stock (&lt;5)</h3>
      <p>${lowStock}</p>
    </div>
  `;
}

/* =============================
   RENDER
============================= */

function render() {
  if (viewMode === "flat") {
    renderFlat();
  } else {
    renderGrouped();
  }
}

/* =============================
   GROUPED VIEW
============================= */

function renderGrouped() {

  if (!filteredData.length) {
    document.getElementById("tableContainer").innerHTML =
      "<p>No data</p>";
    return;
  }

  const headers = Object.keys(filteredData[0]);

  const groups = {};

  filteredData.forEach(row => {
    const key = row[columns.part];
    if (!groups[key]) groups[key] = [];
    groups[key].push(row);
  });

  const html = Object.entries(groups)
    .sort((a, b) =>
      getGroupTotal(b[1]) - getGroupTotal(a[1])
    )
    .map(([part, rows], index) => {

      const total = getGroupTotal(rows);
      const groupId = `group-${index}`;

      return `
        <div class="group">

          <div class="group-header">
            <span>${part}</span>
            <span>Total: ${total}</span>
          </div>

          <div class="group-body">

            <input 
              type="text"
              class="group-search"
              data-group="${groupId}"
              placeholder="Filter within group..."
            />

            <div class="table-grid">

              <div class="table-row header">
                ${headers.map(h =>
                  `<div>${shortHeader(h)}</div>`
                ).join("")}
              </div>

              ${rows.map(r => `
                <div class="table-row group-row"
                     data-group="${groupId}">
                  ${headers.map(h => `
                    <div class="${
                      h === columns.total &&
                      Number(r[h]) < 5
                        ? "low-stock"
                        : ""
                    }">
                      ${r[h]}
                    </div>
                  `).join("")}
                </div>
              `).join("")}

            </div>

          </div>

        </div>
      `;
    }).join("");

  document.getElementById("tableContainer").innerHTML = html;

  attachGroupToggle();
  attachGroupSearch();
}

function attachGroupSearch() {

  document.querySelectorAll(".group-search")
    .forEach(input => {

      input.addEventListener("input", e => {

        const groupId = e.target.dataset.group;

        const terms = e.target.value
          .toLowerCase()
          .split(" ")
          .filter(Boolean);

        const rows = document.querySelectorAll(
          `.group-row[data-group="${groupId}"]`
        );

        rows.forEach(row => {

          const text = row.textContent.toLowerCase();

          const match = terms.every(term =>
            text.includes(term)
          );

          row.style.display = match ? "" : "none";
        });

      });
    });
}

function getGroupTotal(rows) {
  return rows.reduce((sum, r) =>
    sum + Number(r[columns.total]), 0);
}

function attachGroupToggle() {
  document.querySelectorAll(".group-header")
    .forEach(header => {
      header.addEventListener("click", () => {
        const body = header.nextElementSibling;
        body.style.display =
          body.style.display === "block"
            ? "none"
            : "block";
      });
    });
}

/* =============================
   FLAT VIEW
============================= */

function renderFlat() {

  if (!filteredData.length) {
    document.getElementById("tableContainer").innerHTML =
      "<p>No data</p>";
    return;
  }

  const headers = Object.keys(filteredData[0]);

  const headerRow = `
    <div class="table-row header">
      ${headers.map(h =>
        `<div>${h}</div>`).join("")}
    </div>
  `;

  const rows = filteredData.map(r => `
    <div class="table-row">
      ${headers.map(h => `
        <div class="${
          h === columns.total &&
          Number(r[h]) < 5 ? "low-stock" : ""
        }">
          ${r[h]}
        </div>
      `).join("")}
    </div>
  `).join("");

  document.getElementById("tableContainer").innerHTML =
    `<div class="table-grid">
      ${headerRow}
      ${rows}
    </div>`;
}

/* =============================
   HELPERS
============================= */

function populateLocationFilter() {
  const unique = [
    ...new Set(rawData.map(r =>
      r[columns.location]))
  ].sort();

  document.getElementById("locationFilter").innerHTML =
    `<option value="">All Locations</option>` +
    unique.map(loc =>
      `<option value="${loc}">${loc}</option>`
    ).join("");
}

function resetAll() {

  activeSearch = "";
  activeLocation = "";
  activeMinTotal = null;

  document.getElementById("searchInput").value = "";
  document.getElementById("locationFilter").value = "";
  document.getElementById("minTotal").value = "";

  update();
}

</script>
</body>
</html>
